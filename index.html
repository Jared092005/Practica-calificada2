<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <title>Document</title>
  </head>
  <body>
    <header class="titulo-principal">
      <h1 class="texto-principal">New Visit Registration</h1>
      <p class="texto">
        Documenting pastoral care and fellowship visits across the stake
      </p>
    </header>
    <form class="contenedor-principal">
      <div class="contenedor-hermano1">
        <div class="primer-nieto">
          <div class="miembro-img">
            <img
              src="./imagenes/usuario.png"
              alt="miembro"
              class="foto-miembro"
            />
            <h2 class="subtitulos">MEMBER INFORMATION</h2>
          </div>

          <div class="informacion-miembro">
            <div class="nietos">
              <label for="nombre" class="label-color"> Full name</label>
              <input
                type="text"
                placeholder="  Enter member name"
                id="nombre"
                class="input-miembro"
              />
            </div>
            <div class="nietos">
              <label for="nombre" class="label-color"> Adress</label>
              <section class="select-div1">
                <div class="select-image">
                  <img src="./imagenes/hogar.png" alt="mapa" class="img" />
                </div>
                <input
                  type="text"
                  placeholder="Street, City, Postal code"
                  id="nombre"
                  class="input-miembro1"
                />
              </section>
            </div>
            <div class="nietos">
              <label for="nombre" class="label-color"> Phone number</label>
              <section class="select-div1">
                <div class="select-image">
                  <img
                    src="./imagenes/llamada-telefonica.png"
                    alt="phone-number"
                    class="img"
                  />
                </div>
                <input
                  type="text"
                  placeholder="+1 (555) 000-0000"
                  id="nombre"
                  class="input-miembro1"
                />
              </section>
            </div>
          </div>
        </div>
        <div class="segundo-nieto">
          <h2 class="subtitulos">VISIT DETAILS</h2>
          <div class="comentarios">
            <label for="comentarios" class="label-color">Comentarios:</label>
            <textarea
              id="comentarios"
              name="comentarios"
              rows="5"
              cols="40"
              class="comentarios-hijo"
              placeholder="Describe the visit context, needs identified, or spiritual messages shared…"
            ></textarea>
          </div>
        </div>
      </div>
      <div class="contenedor-hermano2">
        <div class="primer-hijo2">
          <h2 class="subtitulos">LOGISTICS</h2>
          <div class="primer-nieto2">
            <div class="primer-bisnieto1">
              <label for="date" class="label-color">Date</label
              ><input type="date" id="date" class="input-date-time" />
            </div>
            <div class="segundo-bisnieto1">
              <label for="time" class="label-color">Time</label
              ><input type="time" id="time" class="input-date-time" />
            </div>
          </div>
          <div class="segundo-nieto2">
            <label for="" class="label-color">Visit Status</label>
            <select class="primer-bisnieto2">
              <option value="">Completed</option>
              <option value="">Pending</option>
              <option value="">In progress</option>
            </select>
          </div>
          <div class="tercer-nieto2">
            <label for="registrar-name" class="label-color"
              >Registrar Name</label
            ><input
              type="text"
              placeholder="Full name of Registrar"
              id="registrar-name"
              class="input-registrar"
            />
          </div>
        </div>
        <div class="segundo-hijo2">
          <iframe
            src="https://www.google.com/maps/embed?pb=..."
            style="border: 0"
            allowfullscreen=""
            loading="lazy"
            class="mapa-google"
          >
          </iframe>

          <div class="el-btn">
            <button class="btn-guardado">
              <img
                src="./imagenes/disco.png"
                alt="miembro"
                class="foto-disco"
              />Guardar Registro
            </button>
          </div>

          <p class="texto-pequeno">
            * information is used for internal congregational support only
          </p>
        </div>
      </div>
    </form>
  </body>
</html>
